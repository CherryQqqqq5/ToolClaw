phase: phase1_workflow_intelligence

execution:
  default_tool_backend: mock
  benchmark_overrides:
    toolsandbox: semantic_mock
  semantic_mock:
    enabled: true
    allow_unknown_tools: true
    ordering_tools_fail_closed: true
    environment_failure_flag: force_environment_failure

planning:
  binder:
    lexical_scoring: true
    description_semantics: true
    metadata_affordances: true
    preferred_capability_bonus: 0.45
    reusable_binding_bonus: 0.35
    distractor_penalty:
      backup_or_fallback: 0.25
      legacy_or_ordering: 0.45

interaction:
  default_backend: simulator
  supported_backends:
    - simulator
    - human
    - llm
  llm_backend:
    mode: scripted
    env_payload_var: TOOLCLAW_LLM_REPLY_PAYLOAD

reuse:
  compile_gate:
    heuristic_promotion: true
    verifier_backed_required: false
    contamination_guard:
      block_eval_split_compile: true
  signature_aliases:
    enabled: true
    include_family_and_failure_only: true
    include_family_caps_failure: true

reporting:
  record_tool_runtime_backend: true
  record_promotion_status: true
  record_promotion_mode: true
