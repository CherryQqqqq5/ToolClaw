benchmark: toolsandbox
adapter: ToolSandboxAdapter

evaluation_modes:
  official_execution:
    entrypoint: scripts/run_toolsandbox_official.sh
    note: run inside the official ToolSandbox environment
  toolclaw_proxy:
    entrypoint: scripts/run_toolsandbox_formal.sh
    note: ToolClaw execution over ToolSandbox-style tasks with current-run proxy summaries

source:
  preferred_defaults:
    - data/toolsandbox.formal.official.json
    - data/toolsandbox.formal.json
    - data/toolsandbox.sample.json
  accepted_formats:
    - json
    - jsonl
  recommended_fields:
    - name
    - messages
    - tool_allow_list
    - categories
    - milestones
    - ideal_turn_count
    - ideal_tool_calls
    - result_summary

metrics:
  primary:
    - milestone_similarity
    - binary_success_rate
  secondary:
    - milestone_coverage
    - hallucination_avoidance
    - state_dependency_score
    - interaction_efficiency
    - tool_efficiency
    - turn_efficiency
    - result_summary_coverage
    - recovery_salvage_rate

baselines:
  - id: B0_direct_agent
    definition: same model, same ToolSandbox tool list, no ToolClaw planner/repair/interaction controller
  - id: B1_native_toolsandbox_agent
    definition: ToolSandbox native direct agent for the same backbone when available
  - id: A_toolclaw
    definition: same backbone wrapped with ToolClaw workflow control

priority_categories:
  - insufficient_information
  - state_dependency
  - multiple_user_turn
  - multiple_tool
  - canonicalization
  - single_tool
  - single_user_turn
