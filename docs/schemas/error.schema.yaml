$schema: "https://json-schema.org/draft/2020-12/schema"
title: ToolClaw Error Schema v0

type: object
additionalProperties: false
required:
  - error_id
  - run_id
  - workflow_id
  - timestamp
  - phase
  - category
  - subtype
  - severity
  - stage
  - symptoms
  - evidence
  - state_context
  - recoverability

properties:
  error_id: { type: string }
  run_id: { type: string }
  workflow_id: { type: string }
  step_id: { type: [string, 'null'] }
  timestamp: { type: string, format: date-time }
  phase: { type: string, enum: [phase1_training_free] }

  category:
    type: string
    enum:
      - selection_failure
      - binding_failure
      - ordering_failure
      - state_failure
      - constraint_failure
      - permission_failure
      - environment_failure
      - interaction_failure
      - recovery_failure

  subtype: { type: string }
  severity: { type: string, enum: [low, medium, high, fatal] }
  stage: { type: string, enum: [planning, binding, execution, interaction, recovery] }
  symptoms: { type: array, items: { type: string } }

  evidence:
    type: object
    additionalProperties: false
    properties:
      tool_id: { type: [string, 'null'] }
      raw_message: { type: [string, 'null'] }
      exception_type: { type: [string, 'null'] }
      related_events: { type: array, items: { type: string } }
      inputs: { type: object }
      outputs: { type: object }
      metadata: { type: object }

  root_cause_hypothesis:
    type: array
    items: { type: string }

  state_context:
    type: object
    additionalProperties: false
    properties:
      active_capability: { type: [string, 'null'] }
      active_step_id: { type: [string, 'null'] }
      missing_assets: { type: array, items: { type: string } }
      state_values: { type: object }
      policy_flags: { type: object }

  recoverability:
    type: object
    additionalProperties: false
    required: [recoverable, requires_user_input, requires_tool_switch, requires_rollback, requires_approval]
    properties:
      recoverable: { type: boolean }
      requires_user_input: { type: boolean }
      requires_tool_switch: { type: boolean }
      requires_rollback: { type: boolean }
      requires_approval: { type: boolean }

  failtax_label: { type: [string, 'null'] }
  metadata: { type: object }
