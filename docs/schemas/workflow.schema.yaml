$schema: "https://json-schema.org/draft/2020-12/schema"
title: ToolClaw Workflow Schema v0

type: object
additionalProperties: false
required:
  - workflow_id
  - version
  - phase
  - task
  - context
  - capability_graph
  - tool_bindings
  - execution_plan
  - policy
  - reusable_targets

properties:
  workflow_id:
    type: string
  version:
    type: string
  phase:
    type: string
    enum: [phase1_training_free]

  task:
    type: object
    additionalProperties: false
    required: [task_id, user_goal, success_criteria, constraints]
    properties:
      task_id: { type: string }
      user_goal: { type: string }
      success_criteria:
        type: array
        items: { type: string }
      constraints:
        type: object
        additionalProperties: false
        properties:
          budget_limit: { type: [number, 'null'] }
          time_limit: { type: [number, 'null'] }
          risk_level: { type: string, enum: [low, medium, high] }
          requires_user_approval: { type: boolean }
          forbidden_actions:
            type: array
            items: { type: string }

  context:
    type: object
    additionalProperties: false
    required: [environment, candidate_tools]
    properties:
      environment:
        type: object
        additionalProperties: false
        required: [platform, available_assets, missing_assets, permissions]
        properties:
          platform: { type: string, enum: [local, web, api, mixed] }
          available_assets:
            type: array
            items: { type: string }
          missing_assets:
            type: array
            items: { type: string }
          permissions:
            type: object
            additionalProperties: false
            properties:
              network: { type: boolean }
              filesystem_read: { type: boolean }
              filesystem_write: { type: boolean }
              external_api: { type: boolean }
      candidate_tools:
        type: array
        minItems: 1
        items:
          type: object
          additionalProperties: false
          required: [tool_id, description]
          properties:
            tool_id: { type: string }
            description: { type: string }
            input_schema_ref: { type: [string, 'null'] }
            output_schema_ref: { type: [string, 'null'] }
            metadata: { type: object }

  capability_graph:
    type: object
    additionalProperties: false
    required: [capabilities, edges]
    properties:
      capabilities:
        type: array
        minItems: 2
        items:
          type: object
          additionalProperties: false
          required: [capability_id, description]
          properties:
            capability_id: { type: string }
            description: { type: string }
            preconditions:
              type: array
              items: { type: string }
            postconditions:
              type: array
              items: { type: string }
      edges:
        type: array
        items:
          type: object
          additionalProperties: false
          required: [source, target]
          properties:
            source: { type: string }
            target: { type: string }
            condition: { type: [string, 'null'] }

  tool_bindings:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [capability_id, primary_tool]
      properties:
        capability_id: { type: string }
        primary_tool: { type: string }
        backup_tools:
          type: array
          items: { type: string }
        binding_confidence: { type: number }

  execution_plan:
    type: array
    minItems: 2
    items:
      type: object
      additionalProperties: false
      required: [step_id, capability_id, tool_id, action_type, inputs]
      properties:
        step_id: { type: string }
        capability_id: { type: string }
        tool_id: { type: [string, 'null'] }
        action_type: { type: string, enum: [tool_call, user_query, policy_check, repair] }
        inputs: { type: object }
        expected_output: { type: [string, 'null'] }
        checkpoint: { type: boolean }
        rollback_to: { type: [string, 'null'] }
        requires_user_confirmation: { type: boolean }
        metadata: { type: object }

  policy:
    type: object
    additionalProperties: false
    required: [approval_rules, recovery_rules, stop_rules]
    properties:
      approval_rules: { type: array }
      recovery_rules: { type: array }
      stop_rules:
        type: array
        items: { type: string }

  reusable_targets:
    type: object
    additionalProperties: false
    required: [compile_skill, compile_workflow, compile_policy_snippet]
    properties:
      compile_skill: { type: boolean }
      compile_workflow: { type: boolean }
      compile_policy_snippet: { type: boolean }

  metadata:
    type: object
