$schema: "https://json-schema.org/draft/2020-12/schema"
title: ToolClaw Repair Schema v0

type: object
additionalProperties: false
required:
  - repair_id
  - run_id
  - workflow_id
  - phase
  - repair_type
  - decision
  - actions
  - interaction
  - workflow_patch
  - post_conditions
  - result
  - timestamp

properties:
  repair_id: { type: string }
  run_id: { type: string }
  workflow_id: { type: string }
  triggered_error_ids: { type: array, items: { type: string } }
  trigger_event_id: { type: [string, 'null'] }
  phase: { type: string, enum: [phase1_training_free, phase2_workflow_intelligence] }

  repair_type:
    type: string
    enum:
      - ask_user
      - request_approval
      - rebind_args
      - switch_tool
      - switch_backup_path
      - insert_missing_step
      - reorder_steps
      - rollback_to_checkpoint
      - acquire_missing_asset
      - relax_noncritical_constraint
      - abort_workflow

  decision:
    type: object
    additionalProperties: false
    required: [strategy, rationale, confidence]
    properties:
      strategy: { type: string, enum: [direct_patch, user_in_the_loop, fallback, rollback_and_retry, safe_abort] }
      rationale: { type: string }
      confidence: { type: number }
      metadata: { type: object }

  actions:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [action_id, action_type]
      properties:
        action_id: { type: string }
        action_type:
          type: string
          enum: [state_patch, re_execute_step, switch_tool, insert_step, remove_step, reorder_steps, rollback, ask_user, request_approval, update_policy_flag, abort]
        target: { type: [string, 'null'] }
        value_source: { type: [string, 'null'] }
        value: {}
        metadata: { type: object }

  interaction:
    type: object
    additionalProperties: false
    properties:
      ask_user: { type: boolean }
      question: { type: [string, 'null'] }
      expected_answer_type: { type: [string, 'null'] }
      user_response: {}
      answer_patch:
        type: object
        additionalProperties: false
        properties:
          patched_slots: { type: array, items: { type: string } }
          patched_constraints: { type: object }
          patch_confidence: { type: number }
          compiler_status: { type: string }
          metadata: { type: object }

  workflow_patch:
    type: object
    additionalProperties: false
    properties:
      modified_steps: { type: array, items: { type: string } }
      reordered_steps: { type: array, items: { type: string } }
      inserted_steps: { type: array, items: { type: string } }
      removed_steps: { type: array, items: { type: string } }
      metadata: { type: object }

  post_conditions:
    type: object
    additionalProperties: false
    properties:
      expected_effects: { type: array, items: { type: string } }
      stop_if: { type: array, items: { type: string } }

  result:
    type: object
    additionalProperties: false
    properties:
      status: { type: string, enum: [pending, applied, succeeded, failed, aborted] }
      success: { type: [boolean, 'null'] }
      followup_error_id: { type: [string, 'null'] }
      message: { type: [string, 'null'] }
      metadata: { type: object }

  timestamp: { type: string, format: date-time }
  metadata: { type: object }
